<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Aegis Linux | Login</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #161b22; padding: 40px; border-radius: 15px; border: 1px solid #30363d; width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 5px; border: none; background: #238636; color: white; font-weight: bold; cursor: pointer; }
        button:hover { background: #2ea043; }
        .logo { font-size: 24px; font-weight: bold; color: #58a6ff; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">🛡️ Aegis Linux</div>
        <p>Painel de Controle Parental</p>
        <input type="text" id="user" placeholder="Usuário Admin">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="fazerLogin()">ENTRAR</button>
        <p id="msg" style="font-size: 12px; color: #f85149;"></p>
    </div>

    <script>
        function fazerLogin() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            
            // Lógica Temporária: Se o usuário e senha forem 'admin', ele deixa passar
            // No futuro, vamos conectar isso ao arquivo JSON no GitHub
            if(user === "admin" && pass === "1234") {
                localStorage.setItem("aegis_auth", "true");
                window.location.href = "index.html"; // Vai para a tela de controle
            } else {
                document.getElementById('msg').innerText = "Usuário ou senha incorretos.";
            }
        }
    </script>
</body>
</html>
